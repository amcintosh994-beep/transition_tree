repos:
  - repo: local
    hooks:
      - id: mttt-normalize
        name: MTTT normalize canonical fixtures
        entry: python -m mttt.cli normalize --data-dir fixtures/valid_minimal
        language: system
        pass_filenames: false

      - id: assert-no-diff
        name: Assert no git diff after normalization
        entry: python -c "import subprocess, sys; raise SystemExit(subprocess.call(['git','diff','--exit-code']))"
        language: system
        pass_filenames: false

      - id: reject-utf8-bom
        name: Reject UTF-8 BOM in tracked text files
        entry: python scripts/reject_utf8_bom.py
        language: system
        pass_filenames: false
