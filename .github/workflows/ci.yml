name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable)
        run: |
          python -m pip install -e .
          python -m pip install --upgrade pip
          python -m 
          
      - name: CLI gate (installed entryopint)
        run: |
          mttt check --data-dir fixtures/valid_minimal

      - name: Unit tests
        run: |
          python -m unittest -q

      - name: CLI gate (fixture)
        run: |
          python -m mttt.cli check --data-dir fixtures/valid_minimal
          mttt -h
          mttt check --data-dir fixtures/valid_minimal
          mttt normalize --data-dir fixtures/valid_minimal
