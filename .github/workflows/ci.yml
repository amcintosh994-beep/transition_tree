name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install (editable)
        run: python -m pip install -e .

      - name: Smoke test console script
        run: mttt -h

      - name: CLI gate (fixtures)
        run: mttt check --data-dir fixtures/valid_minimal

      - name: Normalize canonical fixtures (and assert no drift)
        run: |
          mttt normalize --data-dir fixtures/valid_minimal
          git diff --exit-code

      - name: Run tests
        run: python -m unittest -q

