name: CI
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ "3.11" ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pre-commit
      - name: Pre-commit (compiler gate)
        run: |
          pre-commit run -a
      - name: Unit tests
        run: |
          python -m unittest -q
      - name: MTTT check (end-to-end)
        run: |
          mttt check --data-dir fixtures/valid_minimal